      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAeofl_uWBxn7gU43s7aCqZoEYyHlEQQTM",
      authDomain: "cucciolo-db4af.firebaseapp.com",
      projectId: "cucciolo-db4af",
      storageBucket: "cucciolo-db4af.firebasestorage.app",
      messagingSenderId: "154664971869",
      appId: "1:154664971869:web:2e1feb5cbcd90f3912e7b4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
getRedirectResult(auth).catch(() => {});

    // Rendo disponibili all'app tre funzioni semplici
    window.cloud = {
      pronto: true,
      // salva il mio cucciolo sul server, sotto il mio codice
      salva: async (codice, dati) => {
        try { await setDoc(doc(db, "cuccioli", codice), dati); return true; }
        catch (e) { console.log("salva:", e); return false; }
      },
      // legge una volta il cucciolo di un certo codice
      leggi: async (codice) => {
        try { const s = await getDoc(doc(db, "cuccioli", codice)); return s.exists() ? s.data() : null; }
        catch (e) { console.log("leggi:", e); return null; }
      },
      // resta in ascolto: ogni volta che l'amico cambia qualcosa, richiama la funzione
      ascolta: (codice, quandoCambia) => {
        try { return onSnapshot(doc(db, "cuccioli", codice), s => { if (s.exists()) quandoCambia(s.data()); }); }
        catch (e) { console.log("ascolta:", e); return () => {}; }
      },
accediGoogle: async () => { await signInWithRedirect(auth, provider); },
inviaEvento: async (codice, evento) => {
try {
const ref = doc(db, "eventi", codice);
const s = await getDoc(ref);
const coda = (s.exists() && Array.isArray(s.data().coda)) ? s.data().coda : [];
coda.push(evento);
await setDoc(ref, { coda });
return true;
} catch (e) { console.log("inviaEvento:", e); return false; }
},
ascoltaEventi: (codice, cb) => {
try { return onSnapshot(doc(db, "eventi", codice), s => cb(s.exists() && Array.isArray(s.data().coda) ? s.data().coda : [])); }
catch (e) { console.log("ascoltaEventi:", e); return () => {}; }
},
svuotaEventi: async (codice, restanti) => {
try { await setDoc(doc(db, "eventi", codice), { coda: restanti || [] }); return true; }
catch (e) { console.log("svuotaEventi:", e); return false; }
},
esci: async () => { try { await signOut(auth); return true; } catch (e) { console.log("esci:", e); return false; } },
onUtente: (cb) => onAuthStateChanged(auth, cb),
salvaAccount: async (uid, dati) => { try { await setDoc(doc(db, "utenti", uid), dati); return true; } catch (e) { console.log("salvaAccount:", e); return false; } },
leggiAccount: async (uid) => { try { const s = await getDoc(doc(db, "utenti", uid)); return s.exists() ? s.data() : null; } catch (e) { console.log("leggiAccount:", e); return null; } }
};
    window.dispatchEvent(new Event("cloud-pronto"));

    // Somma di quanto già fatto OGGI per un certo tipo di traguardo
    function fattoOggi(milestones, tipo, riferimentoIso) {
      const oggi = riferimentoIso ? new Date(riferimentoIso) : new Date();
      const stessoGiorno = (iso) => {
        const d = new Date(iso);
        return d.getFullYear() === oggi.getFullYear() && d.getMonth() === oggi.getMonth() && d.getDate() === oggi.getDate();
      };
      return (milestones || []).filter(m => m.type === tipo && stessoGiorno(m.date)).reduce((s, m) => s + (m.amount || 0), 0);
    }

    function dataInputOggi() {
      const d = new Date();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const gg = String(d.getDate()).padStart(2, "0");
      return d.getFullYear() + "-" + mm + "-" + gg;
    }
    function isoDaGiorno(giornoStr) {
      if (!giornoStr || giornoStr === dataInputOggi()) return new Date().toISOString();

      let coda = "";
      for (let i = 0; i < 4; i++) coda += alfabeto[Math.floor(Math.random() * alfabeto.length)];
      return base + "-" + coda;

    function FormTraguardo({ profile, setProfile, T }) {

          mioNome: profile.mioNome || "",
          nomeCucciolo: profile.nomeCucciolo || profile.petName || "",
          animalId: animal.id,
          points: profile.points || 0,
          vitaDays: profile.vitaDays || 0,
          cigarettes: profile.cigarettes || 0,
          drinks: profile.drinks || 0,
          sesso: profile.sesso || 0,
          // conteggio di ogni tipo di vizio, così l'amico li vede tutti
          viziConteggi: Object.keys(VIZI_TIPI).reduce((acc, tipo) => {
            acc[tipo] = (profile.viziLog || []).filter(v => v.tipo === tipo).length;
            return acc;
          }, {}),
          // backup completo: tutto il profilo + l'animale, per recuperarlo se il telefono perde i dati
          backupProfilo: JSON.stringify(profile),
          backupAnimale: JSON.stringify(animal),
          aggiornato: new Date().toISOString(),
        });
      }, [statoCloud, profile, animal]);

      // Resto in ascolto dei cuccioli di tutti gli amici collegati (max 10)
      useEffect(() => {
        if (statoCloud !== "ok" || !profile) return;
        // lista amici: nuova (codiciAmici) o vecchia (codiceAmico singolo)
        let codici = profile.codiciAmici || [];
        if ((!codici || codici.length === 0) && profile.codiceAmico) codici = [profile.codiceAmico];
        if (!codici || codici.length === 0) return;
        const stoppers = codici.slice(0, 10).map(codice =>
          window.cloud.ascolta(codice, dati => setAmiciDati(prev => Object.assign({}, prev, { [codice]: dati })))
        );
        return () => { stoppers.forEach(s => { if (typeof s === "function") s(); }); };
      }, [statoCloud, profile && (profile.codiciAmici || []).join(","), profile && profile.codiceAmico]);

const condividiEventoAmico = useCallback(async (codiceAmico, evento) => {
if (!codiceAmico || !window.cloud || !window.cloud.inviaEvento) return false;
return await window.cloud.inviaEvento(codiceAmico, evento);
}, []);

// Eventi condivisi in arrivo: attività fatte insieme da un amico tolgono/aggiungono vita anche a me
useEffect(() => {
if (statoCloud !== "ok" || !profile || !profile.codice) return;
const stop = window.cloud.ascoltaEventi(profile.codice, (coda) => {
if (!coda || coda.length === 0) return;
setProfile(prev => {
if (!prev) return prev;
let vita = prev.vitaDays;
let log = prev.viziLog || [];
let extra = {};
coda.forEach(ev => {
vita = Math.max(0, Math.min(MAX_VITA_DAYS, vita + (ev.vita || 0)));
log = [{ id: uid(), tipo: ev.tipo, vita: ev.vita, data: new Date().toISOString(), insiemeCon: ev.daNome || "" }, ...log];
if (ev.tipo === "sigaretta") { extra.cigarettes = (extra.cigarettes ?? prev.cigarettes ?? 0) + 1; extra.lastSmoke = new Date().toISOString(); }
if (ev.tipo === "drink") { extra.drinks = (extra.drinks ?? prev.drinks ?? 0) + 1; extra.lastDrink = new Date().toISOString(); }
if (ev.tipo === "sesso") { extra.sesso = (extra.sesso ?? prev.sesso ?? 0) + 1; extra.lastSesso = new Date().toISOString(); }
});
const nuovo = { ...prev, ...extra, vitaDays: vita, viziLog: log };
try { localStorage.setItem("pet-profile", JSON.stringify(nuovo)); } catch (e) {}
return nuovo;
});
window.cloud.svuotaEventi(profile.codice, []);
});
return () => { if (typeof stop === "function") stop(); };
}, [statoCloud, profile && profile.codice]);


      const saveProfile = useCallback((p) => {
        setProfile(p);
        try { localStorage.setItem("pet-profile", JSON.stringify(p)); } catch (e) {}
      }, []);

// Resto in ascolto di chi e' collegato con Google
useEffect(() => {
let off = () => {};
const setup = () => {
if (window.cloud && window.cloud.onUtente) {
off = window.cloud.onUtente(u => { setCloudUser(u); setAccessoInCorso(false); });
}
};
if (window.cloud && window.cloud.pronto) setup();
else window.addEventListener("cloud-pronto", setup);
return () => { window.removeEventListener("cloud-pronto", setup); off(); };
}, []);

// Se sono collegata con Google e non ho ancora un cucciolo su questo telefono, lo recupero dal mio account
useEffect(() => {
if (statoCloud !== "ok" || !loaded || !cloudUser) return;
if (profile) return;
let annullato = false;
window.cloud.leggiAccount(cloudUser.uid).then(dati => {
if (annullato || !dati || !dati.backupProfilo) return;
try {
const p = JSON.parse(dati.backupProfilo);
const a = dati.backupAnimale ? JSON.parse(dati.backupAnimale) : null;
const l = dati.backupLogin ? JSON.parse(dati.backupLogin) : null;
setProfile(prev => {
if (prev) return prev;
try {
localStorage.setItem("pet-profile", JSON.stringify(p));
if (a) localStorage.setItem("pet-animal", JSON.stringify(a));
if (l) localStorage.setItem("pet-login", JSON.stringify(l));
} catch (e) {}
return p;
});
if (a) setAnimal(prev => prev || a);
if (l) setDatiLogin(prev => prev || l);
} catch (e) {}
});
return () => { annullato = true; };
}, [statoCloud, loaded, profile, cloudUser]);

// Ogni volta che il mio cucciolo cambia, se sono collegata con Google salvo anche li' il backup
useEffect(() => {
if (statoCloud !== "ok" || !profile || !animal || !cloudUser) return;
window.cloud.salvaAccount(cloudUser.uid, {
backupProfilo: JSON.stringify(profile),
backupAnimale: JSON.stringify(animal),
backupLogin: JSON.stringify(datiLogin),
aggiornato: new Date().toISOString(),
});
}, [statoCloud, profile, animal, cloudUser, datiLogin]);

const accediConGoogle = () => {
if (!window.cloud || !window.cloud.accediGoogle) return;
setAccessoInCorso(true);
Promise.resolve(window.cloud.accediGoogle()).catch((e) => {
console.log("accediGoogle:", e);
setAccessoInCorso(false);
alert("Non riesco a collegarmi con Google da qui. Riprova tra poco.");
});
};

const disconnettiGoogle = async () => {
if (window.cloud && window.cloud.esci) await window.cloud.esci();
setCloudUser(null);
};

const completaLogin = (dati) => {
        const codice = generaCodice(dati.nomeCucciolo);
        const login = { ...dati, codice };
        setDatiLogin(login);
        try { localStorage.setItem("pet-login", JSON.stringify(login)); } catch (e) {}
      };

      const selectAnimal = (selected) => {
        setAnimal(selected);
        try { localStorage.setItem("pet-animal", JSON.stringify(selected)); } catch (e) {}
        const base = {
          petName: selected.name,
          animalType: selected.id,
          mioNome: datiLogin ? datiLogin.mioNome : "",
          nomeCucciolo: datiLogin ? datiLogin.nomeCucciolo : selected.name,
          codice: datiLogin ? datiLogin.codice : generaCodice(selected.name),
          codiceAmico: datiLogin ? datiLogin.codiceAmico : "",
        };
        if (profile && profile.animalType === selected.id) {
          saveProfile({ ...profile, ...base });
        } else {
          saveProfile({ ...PROFILE_DEFAULTS, ...base, dataInizio: new Date().toISOString() });
        }
      };

      const resetCucciolo = () => {
        try { localStorage.removeItem("pet-profile"); localStorage.removeItem("pet-animal"); } catch (e) {}
        setProfile(null);
        setAnimal(null);
        setTab("home");
      };

      const cambiaTema = (temaId) => {
        saveProfile({ ...profile, tema: temaId });
      };

      if (!loaded) return React.createElement("div");
      if (!datiLogin) return React.createElement(Login, { onDone: completaLogin, onGoogleLogin: accediConGoogle, accessoInCorso, nomeGoogle: cloudUser ? (cloudUser.displayName || "") : "" });
      if (!animal) return React.createElement(AnimalSelector, { onSelect: selectAnimal });
      if (!profile) return React.createElement(AnimalSelector, { onSelect: selectAnimal });

      const stage = stageFor(profile.points);
      const isDead = etaGiorni(profile) >= profile.vitaDays;

      const T = tema(profile);
      const sfondoTema = T.sfondo;
      return React.createElement("div", { style: { fontFamily: "'Quicksand', sans-serif", background: T.tinta, height: "100%", width: "100%", maxWidth: 560, margin: "0 auto", display: "flex", flexDirection: "column", color: T.testo, overflow: "hidden" } },
        askChange && React.createElement("div", { style: { position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(74,58,107,0.35)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 24 } },
          React.createElement("div", { style: { background: "#fff", borderRadius: 20, padding: 24, maxWidth: 320, width: "100%", textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.25)" } },
            React.createElement("div", { style: { fontSize: 40, marginBottom: 8 } }, "🐾"),
            React.createElement("h2", { style: { fontSize: 18, fontWeight: 700, color: "#4A3A6B", marginBottom: 8, fontFamily: "'Fredoka', sans-serif" } }, "Cambiare animale?"),
            React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginBottom: 20, lineHeight: 1.5 } }, "Tornerai alla scelta dell'animale. I progressi di " + animal.name + " restano salvati e li ritrovi se lo riscegli."),
            React.createElement("div", { style: { display: "flex", gap: 10 } },
              React.createElement("button", { onClick: () => setAskChange(false), style: { flex: 1, background: "rgba(180,165,214,0.15)", color: "#8F84B0", border: "none", borderRadius: 14, padding: "12px 0", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" } }, "No"),
              React.createElement("button", { onClick: () => { try { localStorage.removeItem("pet-animal"); } catch (e) {} setAskChange(false); setAnimal(null); setTab("home"); }, style: { flex: 1, background: "linear-gradient(135deg, #FFC53D, #FFD966)", color: "#4A3A6B", border: "none", borderRadius: 14, padding: "12px 0", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" } }, "Sì")
            )
          )
        ),
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 18px 10px", paddingTop: "calc(16px + env(safe-area-inset-top))", background: T.tinta, borderBottom: "1px solid " + T.bordo } },
          React.createElement("div", null,
            React.createElement("div", { style: { fontFamily: "'Fredoka', sans-serif", fontSize: 20, fontWeight: 700, color: T.testo } }, profile.nomeCucciolo || animal.name),
            React.createElement("div", { style: { fontSize: 11, color: T.tenue } }, stage.label)
          ),
          React.createElement("div", { style: { display: "flex", gap: 8 } },
            React.createElement("button", { onClick: () => setTab("impostazioni"), style: { background: T.cardSoft, border: "1px solid " + T.bordo, borderRadius: 12, padding: "8px 11px", fontSize: 14, cursor: "pointer" } }, "⚙️"),
            React.createElement("button", { onClick: () => setAskChange(true), style: { background: T.cardSoft, border: "1px solid " + T.bordo, borderRadius: 12, padding: "8px 12px", fontSize: 11, fontWeight: 700, color: T.accento, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" } }, "Cambia")
          )
        ),
        React.createElement("div", { style: { flex: 1, background: T.pannello, backdropFilter: "blur(10px)", borderRadius: "24px 24px 0 0", padding: "20px 18px", overflowY: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain", borderTop: "1px solid " + T.bordo } },
          isDead ? React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", textAlign: "center" } },
            React.createElement("div", { style: { fontSize: 64, marginBottom: 12 } }, "😔"),
            React.createElement("h2", { style: { fontSize: 20, fontWeight: 700, color: T.testo, marginBottom: 8, fontFamily: "'Fredoka', sans-serif" } }, animal.name + " se ne è andato..."),
            React.createElement("button", { style: { marginTop: 24, background: T.accento, color: T.suAccento, border: "none", borderRadius: 18, padding: "11px 28px", fontWeight: 700, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" }, onClick: () => { setAnimal(null); saveProfile(null); } }, "Ricominciare")
          ) : tab === "home" ? React.createElement(Home, { profile, stage, animal, T }) : tab === "traguardi" ? React.createElement(Traguardi, { profile, setProfile: saveProfile, T }) : tab === "vizi" ? React.createElement(ViziSfizi, { profile, setProfile: saveProfile, T, codiciAmici: (profile.codiciAmici || (profile.codiceAmico ? [profile.codiceAmico] : [])), mioNome: profile.mioNome, onCondividi: condividiEventoAmico }) : tab === "amico" ? React.createElement(Amico, { profile, amiciDati, statoCloud, setProfile: saveProfile, T, onCondividi: condividiEventoAmico }) : tab === "impostazioni" ? React.createElement(Impostazioni, { profile, animal, cambiaTema, resetCucciolo, T, setProfile: saveProfile, cloudUser, onGoogleLogin: accediConGoogle, onSignOut: disconnettiGoogle, accessoInCorso }) : React.createElement(Statistiche, { profile, T })
        ),
        !isDead && React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(5, 1fr)", background: T.tinta, borderTop: "1px solid " + T.bordo, padding: "10px 8px 16px", gap: 5, flexShrink: 0 } },
          ["home","traguardi","vizi","amico","stats"].map((id, i) => React.createElement("button", { key: id, onClick: () => setTab(id), style: { background: tab === id ? T.accento : T.cardSoft, color: tab === id ? T.suAccento : T.tenue, border: "1px solid " + (tab === id ? T.accento : T.bordo), borderRadius: 12, padding: "12px 0", cursor: "pointer", fontWeight: tab === id ? 700 : 600, fontFamily: "'Quicksand', sans-serif", fontSize: i >= 3 ? 10 : 11 } }, ["Casa","Traguardi","Vizi","Amico","Stats"][i]))
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CucciolataApp));
  </script>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
</body>
