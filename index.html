<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cucciolo - Il tuo animale domestico che cresce">
  <meta name="theme-color" content="#FFEAF7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><text x='50%' y='50%' font-size='120' text-anchor='middle' dominant-baseline='middle'>🐱</text></svg>">
  <title>Cucciolo - Il tuo animale</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #FFE8F5, #E8F5FF); min-height: 100vh; }
    #root {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    img { max-width: 100%; }
    button, select, input { font-family: 'Quicksand', sans-serif; }
    @media (min-width: 700px) {
      #root { max-width: 640px; }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(74, 58, 107, 0.3); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    const { useState, useEffect, useCallback } = React;

    const ANIMALS = [
      { id: "ragdoll", name: "Ragdoll", img: "ragdoll.PNG" },
      { id: "gatto_nero", name: "Gatto Nero", img: "gattonero.PNG" },
      { id: "gatto_grigio", name: "Gatto Grigio", img: "gattogrigio.PNG" },
      { id: "siamese", name: "Siamese", img: "siamese.PNG" },
      { id: "tabby", name: "Tabby", img: "tabby.PNG" },
      { id: "cane_bianco", name: "Cane Bianco", img: "canebianco.PNG" },
      { id: "cane_marrone", name: "Cane Marrone", img: "canemarrone.PNG" },
      { id: "coniglio", name: "Coniglio", img: "coniglio.PNG" },
      { id: "drago", name: "Drago Nero", img: "dragonero.PNG" },
      { id: "tartaruga", name: "Tartaruga", img: "tartaruga.PNG" },
    ];

    const MILESTONE_TYPES = {
      studio: { label: "Studio", unit: "ore", perUnit: 1.5, emoji: "📚" },
      dormi: { label: "Sonno", unit: "ore", perUnit: 0.8, emoji: "😴" },
      esame: { label: "Esame", unit: "voto", isExam: true, emoji: "🎓" },
      denti: { label: "Lavato i denti", unit: "volte", perUnit: 2, emoji: "🪥" },
      allenamento: { label: "Allenamento", unit: "ore", perUnit: 3, emoji: "💪" },
    };

    const RECIPES = [
      { id: "cap", name: "Caprese", emoji: "🥗", vita: 30 },
      { id: "pesto", name: "Pasta al pesto", emoji: "🍝", vita: 50 },
      { id: "tira", name: "Tiramisù", emoji: "🍰", vita: 60 },
      { id: "carb", name: "Carbonara", emoji: "🍝", vita: 55 },
      { id: "gnocchi", name: "Gnocchi", emoji: "🍲", vita: 48 },
      { id: "brusc", name: "Bruschetta", emoji: "🥖", vita: 35 },
      { id: "risotto", name: "Risotto funghi", emoji: "🍚", vita: 52 },
      { id: "pizza", name: "Pizza", emoji: "🍕", vita: 58 },
      { id: "amatri", name: "Amatriciana", emoji: "🍝", vita: 53 },
      { id: "osso", name: "Osso buco", emoji: "🍖", vita: 65 },
    ];

    const MOTIVATIONAL_QUOTES = [
      "Oggi è un giorno perfetto per non fumare! 💪",
      "L'acqua è la miglior medicina. Bevi! 💧",
      "Mangia bene, il tuo animale ti ringrazierà 🥗",
      "Ogni traguardo è un passo verso la felicità ⭐",
      "Prendersi cura di te = prendersi cura di lui 💚",
      "Non fumare oggi = +2 anni per il tuo animale 🎉",
      "Un drink in meno = salute in più 🌟",
      "Il tuo animale crede in te! 🐾",
      "Riposa bene, recupera le forze 😴",
      "Muoviti un po'! Il tuo corpo e il tuo animale ringraziano 🏃",
    ];

    const MAX_VITA_DAYS = 7300; // 20 anni
    const GIORNI_SETTIMANA = 7;

    function stageFor(points) {
      if (points < 100) return { key: "cucciolo", label: "Cucciolotto", icon: "🍼" };
      if (points < 250) return { key: "adolescente", label: "Adolescente", icon: "🎒" };
      if (points < 450) return { key: "piccolo_adulto", label: "Piccolo Adulto", icon: "📚" };
      if (points < 700) return { key: "adulto", label: "Adulto", icon: "💼" };
      return { key: "anziano", label: "Anziano", icon: "🧓" };
    }

    function uid() {
      return Math.random().toString(36).slice(2, 9);
    }

    function formatDays(days) {
      const years = Math.floor(days / 365);
      const months = Math.floor((days % 365) / 30);
      if (years > 0) return `${years}a ${months}m`;
      return `${Math.floor(days)}g`;
    }

    function AnimalSelector({ onSelect }) {
      return React.createElement("div", { style: { padding: "40px 22px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", textAlign: "center", background: "linear-gradient(135deg, #FFE8F5, #E8F5FF)" } },
        React.createElement("div", { style: { fontSize: 52, marginBottom: 12 } }, "🐾"),
        React.createElement("h1", { style: { fontSize: 28, marginBottom: 8, color: "#4A3A6B", fontWeight: 700, fontFamily: "'Fredoka', sans-serif" } }, "Scegli il tuo animale!"),
        React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginBottom: 24 } }, "Quale animale vuoi che cresca con te?"),
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 12, marginBottom: 24, width: "100%" } },
          ANIMALS.map(animal => React.createElement("button", { key: animal.id, onClick: () => onSelect(animal), style: { background: "linear-gradient(135deg, rgba(255,197,61,0.6), rgba(255,217,102,0.6))", border: "2px solid #FFC53D", borderRadius: 14, padding: 16, cursor: "pointer", fontFamily: "'Quicksand', sans-serif", fontSize: 14, fontWeight: 700, color: "#4A3A6B", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 } },
            React.createElement("img", { src: animal.img, style: { width: 80, height: 80, objectFit: "contain" }, alt: animal.name }),
            React.createElement("div", null, animal.name)
          ))
        )
      );
    }

    function Home({ profile, stage, animal }) {
      const vitaPercent = (profile.vitaDays / MAX_VITA_DAYS) * 100;
      const getLifeColor = () => vitaPercent > 70 ? "#45D6B5" : vitaPercent > 40 ? "#FFE070" : "#FF6FB0";

      return React.createElement("div", { style: { padding: "4px 4px 20px" } },
        React.createElement("div", { style: { textAlign: "center", marginBottom: 16 } },
          React.createElement("img", { src: animal.img, alt: animal.name, style: { width: "min(240px, 60vw)", height: "min(240px, 60vw)", objectFit: "contain", display: "block", margin: "0 auto 12px", filter: "drop-shadow(0 10px 20px rgba(74,58,107,.2))" } }),
          React.createElement("div", { style: { fontWeight: 700, fontSize: 14, color: "#4A3A6B" } }, stage.label),
          React.createElement("div", { style: { fontSize: 11, color: "#8F84B0" } }, "⭐ " + profile.points + " pt")
        ),
        React.createElement("div", { style: { background: "rgba(255, 232, 240, 0.6)", backdropFilter: "blur(10px)", borderRadius: 14, padding: 14, marginBottom: 12, border: "1px solid rgba(255, 200, 220, 0.3)" } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 8 } },
            React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#4A3A6B" } }, "Vita"),
            React.createElement("div", { style: { fontSize: 13, fontWeight: 700, color: "#FF6FB0" } }, formatDays(profile.vitaDays))
          ),
          React.createElement("div", { style: { background: "rgba(255, 212, 229, 0.8)", borderRadius: 10, height: 24, overflow: "hidden", position: "relative", border: "1px solid rgba(255, 255, 255, 0.4)" } },
            React.createElement("div", { style: { background: getLifeColor(), height: "100%", width: vitaPercent + "%", transition: "width 0.3s ease", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: "#fff" } }, vitaPercent > 10 ? Math.round(vitaPercent) + "%" : "")
          ),
          React.createElement("div", { style: { fontSize: 10, color: "#8F84B0", marginTop: 6, textAlign: "center" } }, "Max 20 anni")
        ),
        React.createElement("div", { style: { background: "rgba(255, 243, 196, 0.6)", backdropFilter: "blur(10px)", borderRadius: 12, padding: 12 } },
          React.createElement("div", { style: { fontSize: 11, color: "#8F84B0", marginBottom: 4 } }, "Motto del giorno"),
          React.createElement("div", { style: { fontSize: 12, color: "#4A9FE0", fontStyle: "italic" } }, '"' + MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)] + '"')
        )
      );
    }

    // Voti esame: valore mostrato + giorni di vita (più alto il voto, più vita; bocciato toglie)
    const EXAM_GRADES = [
      { label: "Bocciato", vita: -182, points: 0 },
      { label: "18", vita: 30, points: 20 },
      { label: "19", vita: 45, points: 22 },
      { label: "20", vita: 60, points: 24 },
      { label: "21", vita: 75, points: 26 },
      { label: "22", vita: 90, points: 28 },
      { label: "23", vita: 105, points: 30 },
      { label: "24", vita: 120, points: 33 },
      { label: "25", vita: 135, points: 36 },
      { label: "26", vita: 150, points: 39 },
      { label: "27", vita: 160, points: 42 },
      { label: "28", vita: 170, points: 45 },
      { label: "29", vita: 175, points: 48 },
      { label: "30", vita: 182, points: 52 },
      { label: "30 e lode", vita: 182, points: 60 },
    ];

    function Traguardi({ profile, setProfile }) {
      const [activeType, setActiveType] = useState(null);
      const [inputValue, setInputValue] = useState("");
      const [examGrade, setExamGrade] = useState("");

      const handleAdd = (typeKey) => {
        if (!inputValue || parseFloat(inputValue) <= 0) return;
        const type = MILESTONE_TYPES[typeKey];
        const points = Math.floor(parseFloat(inputValue) * type.perUnit);
        const milestone = { id: uid(), type: typeKey, amount: parseFloat(inputValue), unitLabel: type.unit, points, vita: GIORNI_SETTIMANA, date: new Date().toISOString() };
        const newProfile = { ...profile, points: profile.points + points, vitaDays: Math.min(MAX_VITA_DAYS, profile.vitaDays + GIORNI_SETTIMANA), milestones: [milestone, ...(profile.milestones || [])] };
        setProfile(newProfile);
        setInputValue("");
        setActiveType(null);
      };

      const handleAddExam = () => {
        if (!examGrade) return;
        const g = EXAM_GRADES.find(x => x.label === examGrade);
        if (!g) return;
        const milestone = { id: uid(), type: "esame", gradeLabel: g.label, vita: g.vita, points: g.points, date: new Date().toISOString() };
        const newProfile = {
          ...profile,
          points: Math.max(0, profile.points + g.points),
          vitaDays: Math.max(0, Math.min(MAX_VITA_DAYS, profile.vitaDays + g.vita)),
          milestones: [milestone, ...(profile.milestones || [])]
        };
        setProfile(newProfile);
        setExamGrade("");
        setActiveType(null);
      };

      const isExam = activeType && MILESTONE_TYPES[activeType].isExam;

      return React.createElement("div", { style: { padding: "4px 4px" } },
        React.createElement("h2", { style: { fontSize: 16, marginBottom: 8, fontWeight: 700, color: "#4A3A6B", fontFamily: "'Fredoka', sans-serif" } }, "I tuoi traguardi"),
        React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginBottom: 12 } }, "Studio, sonno, esami, igiene, allenamento."),
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 } },
          Object.entries(MILESTONE_TYPES).map(([key, type]) => React.createElement("button", { key, onClick: () => { setActiveType(activeType === key ? null : key); setInputValue(""); setExamGrade(""); }, style: { background: activeType === key ? "rgba(69, 214, 181, 0.8)" : "rgba(251, 249, 255, 0.6)", border: activeType === key ? "2px solid #45D6B5" : "1px solid rgba(239, 230, 255, 0.3)", borderRadius: 10, padding: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer", fontSize: 10, color: activeType === key ? "#fff" : "#4A3A6B", fontWeight: activeType === key ? 700 : 500, fontFamily: "'Quicksand', sans-serif" } },
            React.createElement("div", { style: { fontSize: 18 } }, type.emoji),
            React.createElement("div", null, type.label)
          ))
        ),
        (activeType && !isExam) && React.createElement("div", { style: { background: "rgba(69, 214, 181, 0.15)", borderRadius: 12, padding: 12, marginBottom: 16, border: "1px solid rgba(69, 214, 181, 0.3)" } },
          React.createElement("label", { style: { fontSize: 11, color: "#45D6B5", marginBottom: 8, display: "block", fontWeight: 700 } }, "Quanto " + MILESTONE_TYPES[activeType].unit + "?"),
          React.createElement("div", { style: { display: "flex", gap: 8 } },
            React.createElement("input", { style: { flex: 1, padding: "8px 10px", borderRadius: 8, border: "1px solid rgba(255, 255, 255, 0.4)", background: "rgba(255, 255, 255, 0.5)", fontSize: 12, fontFamily: "'Quicksand', sans-serif" }, type: "number", value: inputValue, onChange: (e) => setInputValue(e.target.value), placeholder: "Es. 3", min: "0" }),
            React.createElement("button", { style: { background: "linear-gradient(135deg, #45D6B5, #5FE3CA)", color: "#fff", border: "none", borderRadius: 8, padding: "8px 14px", fontWeight: 700, cursor: "pointer", fontSize: 12, fontFamily: "'Quicksand', sans-serif" }, onClick: () => handleAdd(activeType) }, "Registra")
          )
        ),
        (activeType && isExam) && React.createElement("div", { style: { background: "rgba(69, 214, 181, 0.15)", borderRadius: 12, padding: 12, marginBottom: 16, border: "1px solid rgba(69, 214, 181, 0.3)" } },
          React.createElement("label", { style: { fontSize: 11, color: "#45D6B5", marginBottom: 8, display: "block", fontWeight: 700 } }, "Che voto hai preso?"),
          React.createElement("select", { value: examGrade, onChange: (e) => setExamGrade(e.target.value), style: { width: "100%", padding: "10px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.4)", background: "rgba(255,255,255,0.7)", fontSize: 13, fontFamily: "'Quicksand', sans-serif", color: "#4A3A6B", marginBottom: 10 } },
            React.createElement("option", { value: "" }, "Seleziona il voto..."),
            EXAM_GRADES.map(g => React.createElement("option", { key: g.label, value: g.label }, g.label))
          ),
          examGrade && React.createElement("div", { style: { fontSize: 11, fontWeight: 700, marginBottom: 10, color: (EXAM_GRADES.find(x=>x.label===examGrade).vita >= 0 ? "#45D6B5" : "#FF6FB0") } },
            (EXAM_GRADES.find(x=>x.label===examGrade).vita >= 0 ? "Vita +" : "Vita −") + formatDays(Math.abs(EXAM_GRADES.find(x=>x.label===examGrade).vita))
          ),
          React.createElement("button", { style: { width: "100%", background: "linear-gradient(135deg, #45D6B5, #5FE3CA)", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Quicksand', sans-serif" }, onClick: handleAddExam }, "Registra esame")
        ),
        React.createElement("h2", { style: { fontSize: 16, marginBottom: 8, fontWeight: 700, color: "#4A3A6B", fontFamily: "'Fredoka', sans-serif", marginTop: 20 } }, "Storico"),
        !profile.milestones || profile.milestones.length === 0 ? React.createElement("p", { style: { fontSize: 12, color: "#8F84B0" } }, "Nessun traguardo ancora.") :
        (profile.milestones || []).slice(0, 12).map((m) => React.createElement("div", { key: m.id, style: { background: "rgba(251, 249, 255, 0.6)", borderRadius: 10, padding: 10, marginBottom: 8, display: "flex", gap: 8, alignItems: "center", border: "1px solid rgba(239, 230, 255, 0.3)" } },
          React.createElement("span", { style: { fontSize: 20 } }, MILESTONE_TYPES[m.type].emoji),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { style: { fontWeight: 600, fontSize: 12, color: "#4A3A6B" } }, MILESTONE_TYPES[m.type].label),
            React.createElement("div", { style: { fontSize: 10, color: "#8F84B0" } }, m.type === "esame" ? ("Voto: " + m.gradeLabel) : (m.amount + " " + (m.unitLabel || "")))
          ),
          m.type === "esame"
            ? React.createElement("span", { style: { color: (m.vita >= 0 ? "#45D6B5" : "#FF6FB0"), fontWeight: 700, fontSize: 11 } }, (m.vita >= 0 ? "+" : "−") + formatDays(Math.abs(m.vita)))
            : React.createElement("span", { style: { color: "#45D6B5", fontWeight: 700, fontSize: 12 } }, "+" + m.points)
        ))
      );
    }

    // Etichette per lo storico dei vizi/sfizi
    const VIZI_TIPI = {
      sigaretta: { label: "Sigaretta", emoji: "🚬", vita: -60, colore: "#FF6FB0" },
      drink:     { label: "Drink",     emoji: "🍷", vita: -30, colore: "#FF6FB0" },
      sesso:     { label: "Sesso",     emoji: "❤️", vita: 7,   colore: "#45D6B5" },
    };

    function formatDataOra(iso) {
      const d = new Date(iso);
      const gg = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return gg + "/" + mm + " alle " + hh + ":" + mi;
    }

    function ViziSfizi({ profile, setProfile }) {
      const registra = (tipo) => {
        const t = VIZI_TIPI[tipo];
        const voce = { id: uid(), tipo: tipo, vita: t.vita, data: new Date().toISOString() };
        const nuovo = {
          ...profile,
          vitaDays: Math.max(0, Math.min(MAX_VITA_DAYS, profile.vitaDays + t.vita)),
          viziLog: [voce, ...(profile.viziLog || [])],
        };
        if (tipo === "sigaretta") { nuovo.cigarettes = (profile.cigarettes || 0) + 1; nuovo.lastSmoke = voce.data; }
        if (tipo === "drink")     { nuovo.drinks     = (profile.drinks || 0) + 1;     nuovo.lastDrink = voce.data; }
        if (tipo === "sesso")     { nuovo.sesso      = (profile.sesso || 0) + 1;      nuovo.lastSesso = voce.data; }
        setProfile(nuovo);
      };

      const bottone = (tipo, sottotitolo, conteggio) => {
        const t = VIZI_TIPI[tipo];
        const positivo = t.vita > 0;
        return React.createElement("div", { style: { textAlign: "center", background: positivo ? "rgba(69,214,181,0.15)" : "rgba(255,111,176,0.15)", borderRadius: 12, padding: 12, border: "1px solid " + (positivo ? "rgba(69,214,181,0.3)" : "rgba(255,111,176,0.3)") } },
          React.createElement("div", { style: { fontSize: 22, marginBottom: 2 } }, t.emoji),
          React.createElement("div", { style: { fontSize: 10, color: "#8F84B0", marginBottom: 2 } }, t.label),
          React.createElement("div", { style: { fontSize: 22, fontWeight: 700, color: t.colore } }, conteggio || 0),
          React.createElement("button", {
            style: { background: positivo ? "linear-gradient(135deg, #45D6B5, #5FE3CA)" : "linear-gradient(135deg, #FF6FB0, #FF8FBF)", color: "#fff", border: "none", borderRadius: 8, padding: "8px 4px", fontWeight: 700, cursor: "pointer", marginTop: 8, fontSize: 10, width: "100%" },
            onClick: () => registra(tipo)
          }, sottotitolo)
        );
      };

      const storico = profile.viziLog || [];

      return React.createElement("div", { style: { padding: "4px 4px" } },
        React.createElement("h2", { style: { fontSize: 16, marginBottom: 8, fontWeight: 700, color: "#4A3A6B", fontFamily: "'Fredoka', sans-serif" } }, "Vizi & Sfizi"),
        React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginBottom: 12 } }, "Ogni tocco viene segnato con data e ora."),

        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 } },
          bottone("sigaretta", "+1 (−2 mesi)", profile.cigarettes),
          bottone("drink", "+1 (−1 mese)", profile.drinks),
          bottone("sesso", "+1 (+1 sett.)", profile.sesso)
        ),

        React.createElement("div", { style: { background: "rgba(69, 214, 181, 0.15)", borderRadius: 12, padding: 12, border: "1px solid rgba(69, 214, 181, 0.3)", marginBottom: 16 } },
          React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#4A3A6B", marginBottom: 6 } }, "Premi che puoi ottenere"),
          React.createElement("div", { style: { fontSize: 11, color: "#8F84B0", lineHeight: 1.6 } }, "Un mese intero senza fumare: +1 anno di vita. Una settimana senza bere: +1 anno di vita.")
        ),

        React.createElement("h2", { style: { fontSize: 15, marginBottom: 8, fontWeight: 700, color: "#4A3A6B", fontFamily: "'Fredoka', sans-serif" } }, "Storico"),
        storico.length === 0
          ? React.createElement("p", { style: { fontSize: 12, color: "#8F84B0" } }, "Ancora niente da segnare.")
          : storico.slice(0, 30).map(v => {
              const t = VIZI_TIPI[v.tipo];
              const positivo = v.vita > 0;
              return React.createElement("div", { key: v.id, style: { background: "rgba(251, 249, 255, 0.6)", borderRadius: 10, padding: 10, marginBottom: 8, display: "flex", gap: 8, alignItems: "center", border: "1px solid rgba(239, 230, 255, 0.3)" } },
                React.createElement("span", { style: { fontSize: 18 } }, t.emoji),
                React.createElement("div", { style: { flex: 1, minWidth: 0 } },
                  React.createElement("div", { style: { fontWeight: 600, fontSize: 12, color: "#4A3A6B" } }, t.label),
                  React.createElement("div", { style: { fontSize: 10, color: "#8F84B0" } }, formatDataOra(v.data))
                ),
                React.createElement("span", { style: { color: positivo ? "#45D6B5" : "#FF6FB0", fontWeight: 700, fontSize: 11, whiteSpace: "nowrap" } }, (positivo ? "+" : "−") + formatDays(Math.abs(v.vita)))
              );
            })
      );
    }

    function Statistiche({ profile }) {
      const cleanSmokeDays = profile.lastSmoke ? Math.floor((new Date() - new Date(profile.lastSmoke)) / (1000 * 60 * 60 * 24)) : -1;
      const cleanDrinkDays = profile.lastDrink ? Math.floor((new Date() - new Date(profile.lastDrink)) / (1000 * 60 * 60 * 24)) : -1;

      return React.createElement("div", { style: { padding: "4px 4px" } },
        React.createElement("h2", { style: { fontSize: 16, marginBottom: 8, fontWeight: 700, color: "#4A3A6B", fontFamily: "'Fredoka', sans-serif" } }, "Le tue statistiche 📊"),
        React.createElement("div", { style: { background: "rgba(69, 214, 181, 0.15)", borderRadius: 12, padding: 14, marginBottom: 12, border: "1px solid rgba(69, 214, 181, 0.3)" } },
          React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#4A3A6B", marginBottom: 8 } }, "Giorni senza fumare"),
          React.createElement("div", { style: { fontSize: 28, fontWeight: 700, color: "#45D6B5" } }, cleanSmokeDays >= 0 ? cleanSmokeDays : "—"),
          cleanSmokeDays >= 30 && React.createElement("div", { style: { fontSize: 10, color: "#45D6B5", marginTop: 4, fontWeight: 700 } }, "🎉 +1 anno rigenerato!")
        ),
        React.createElement("div", { style: { background: "rgba(69, 214, 181, 0.15)", borderRadius: 12, padding: 14, marginBottom: 12, border: "1px solid rgba(69, 214, 181, 0.3)" } },
          React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#4A3A6B", marginBottom: 8 } }, "Giorni senza bere"),
          React.createElement("div", { style: { fontSize: 28, fontWeight: 700, color: "#45D6B5" } }, cleanDrinkDays >= 0 ? cleanDrinkDays : "—"),
          cleanDrinkDays >= 7 && React.createElement("div", { style: { fontSize: 10, color: "#45D6B5", marginTop: 4, fontWeight: 700 } }, "🎉 +1 anno rigenerato!")
        ),
        React.createElement("div", { style: { background: "rgba(251, 249, 255, 0.6)", borderRadius: 12, padding: 14, border: "1px solid rgba(239, 230, 255, 0.3)" } },
          React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#4A3A6B", marginBottom: 8 } }, "Traguardi totali"),
          React.createElement("div", { style: { fontSize: 24, fontWeight: 700, color: "#B3A5D6" } }, (profile.milestones || []).length)
        )
      );
    }

    const PROFILE_DEFAULTS = { points: 0, vitaDays: MAX_VITA_DAYS, cigarettes: 0, drinks: 0, sesso: 0, viziLog: [], milestones: [], scalaNuova: true };

    function CucciolataApp() {
      const [profile, setProfile] = useState(null);
      const [animal, setAnimal] = useState(null);
      const [loaded, setLoaded] = useState(false);
      const [tab, setTab] = useState("home");
      const [askChange, setAskChange] = useState(false);

      useEffect(() => {
        try {
          const saved = localStorage.getItem("pet-profile");
          const savedAnimal = localStorage.getItem("pet-animal");
          if (saved) {
            const p = JSON.parse(saved);
            // Vecchi profili avevano vita massima 1825 (5 anni): li portiamo alla nuova scala
            if (p && typeof p.vitaDays === "number" && p.vitaDays <= 1825 && !p.scalaNuova) {
              p.vitaDays = MAX_VITA_DAYS;
              p.scalaNuova = true;
            }
            setProfile(p);
          }
          if (savedAnimal) setAnimal(JSON.parse(savedAnimal));
        } catch (e) {}
        setLoaded(true);
      }, []);

      const saveProfile = useCallback((p) => {
        setProfile(p);
        try { localStorage.setItem("pet-profile", JSON.stringify(p)); } catch (e) {}
      }, []);

      const selectAnimal = (selected) => {
        setAnimal(selected);
        try { localStorage.setItem("pet-animal", JSON.stringify(selected)); } catch (e) {}
        if (profile && profile.animalType === selected.id) {
          saveProfile({ ...profile, petName: selected.name, animalType: selected.id });
        } else {
          saveProfile({ ...PROFILE_DEFAULTS, petName: selected.name, animalType: selected.id });
        }
      };

      if (!loaded || !animal) return React.createElement(AnimalSelector, { onSelect: selectAnimal });
      if (!profile) return React.createElement(AnimalSelector, { onSelect: selectAnimal });

      const stage = stageFor(profile.points);
      const isDead = profile.vitaDays <= 0;

      return React.createElement("div", { style: { fontFamily: "'Quicksand', sans-serif", background: "linear-gradient(135deg, #FFE8F5, #E8F5FF)", minHeight: "100vh", width: "100%", maxWidth: 560, margin: "0 auto", display: "flex", flexDirection: "column", color: "#4A3A6B" } },
        askChange && React.createElement("div", { style: { position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(74,58,107,0.35)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 24 } },
          React.createElement("div", { style: { background: "#fff", borderRadius: 20, padding: 24, maxWidth: 320, width: "100%", textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.25)" } },
            React.createElement("div", { style: { fontSize: 40, marginBottom: 8 } }, "🐾"),
            React.createElement("h2", { style: { fontSize: 18, fontWeight: 700, color: "#4A3A6B", marginBottom: 8, fontFamily: "'Fredoka', sans-serif" } }, "Cambiare animale?"),
            React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginBottom: 20, lineHeight: 1.5 } }, "Tornerai alla scelta dell'animale. I progressi di " + animal.name + " restano salvati e li ritrovi se lo riscegli."),
            React.createElement("div", { style: { display: "flex", gap: 10 } },
              React.createElement("button", { onClick: () => setAskChange(false), style: { flex: 1, background: "rgba(180,165,214,0.15)", color: "#8F84B0", border: "none", borderRadius: 14, padding: "12px 0", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" } }, "No"),
              React.createElement("button", { onClick: () => { try { localStorage.removeItem("pet-animal"); } catch (e) {} setAskChange(false); setAnimal(null); setTab("home"); }, style: { flex: 1, background: "linear-gradient(135deg, #FFC53D, #FFD966)", color: "#4A3A6B", border: "none", borderRadius: 14, padding: "12px 0", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" } }, "Sì")
            )
          )
        ),
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 18px 10px", background: "rgba(255, 255, 255, 0.7)", backdropFilter: "blur(20px)", borderBottom: "1px solid rgba(255, 255, 255, 0.5)" } },
          React.createElement("div", null,
            React.createElement("div", { style: { fontFamily: "'Fredoka', sans-serif", fontSize: 20, fontWeight: 700, color: "#4A3A6B" } }, animal.name),
            React.createElement("div", { style: { fontSize: 11, color: "#8F84B0" } }, stage.label)
          ),
          React.createElement("button", { onClick: () => setAskChange(true), style: { background: "rgba(255,255,255,0.6)", border: "1px solid rgba(180,165,214,0.5)", borderRadius: 12, padding: "8px 12px", fontSize: 11, fontWeight: 700, color: "#8F5FC7", cursor: "pointer", fontFamily: "'Quicksand', sans-serif" } }, "Cambia")
        ),
        React.createElement("div", { style: { flex: 1, background: "rgba(255, 255, 255, 0.6)", backdropFilter: "blur(10px)", borderRadius: "24px 24px 0 0", padding: "20px 18px", overflowY: "auto", borderTop: "1px solid rgba(255, 255, 255, 0.8)" } },
          isDead ? React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", textAlign: "center" } },
            React.createElement("div", { style: { fontSize: 64, marginBottom: 12 } }, "😔"),
            React.createElement("h2", { style: { fontSize: 20, fontWeight: 700, color: "#4A3A6B", marginBottom: 8, fontFamily: "'Fredoka', sans-serif" } }, animal.name + " se ne è andato..."),
            React.createElement("button", { style: { marginTop: 24, background: "linear-gradient(135deg, #FFC53D, #FFD966)", color: "#4A3A6B", border: "none", borderRadius: 18, padding: "11px 28px", fontWeight: 700, cursor: "pointer", fontFamily: "'Quicksand', sans-serif" }, onClick: () => { setAnimal(null); saveProfile(null); } }, "Ricominciare")
          ) : tab === "home" ? React.createElement(Home, { profile, stage, animal }) : tab === "traguardi" ? React.createElement(Traguardi, { profile, setProfile: saveProfile }) : tab === "vizi" ? React.createElement(ViziSfizi, { profile, setProfile: saveProfile }) : React.createElement(Statistiche, { profile })
        ),
        !isDead && React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", background: "rgba(255, 255, 255, 0.7)", backdropFilter: "blur(20px)", borderTop: "1px solid rgba(255, 255, 255, 0.5)", padding: "6px 10px 10px", gap: 4 } },
          React.createElement("button", { onClick: () => setTab("home"), style: { background: tab === "home" ? "#FFE070" : "transparent", color: tab === "home" ? "#4A3A6B" : "#B3A5D6", border: "none", borderRadius: 10, padding: "8px 0", cursor: "pointer", fontWeight: tab === "home" ? 700 : 500, fontFamily: "'Quicksand', sans-serif", fontSize: 11 } }, "Casa"),
          React.createElement("button", { onClick: () => setTab("traguardi"), style: { background: tab === "traguardi" ? "#FFE070" : "transparent", color: tab === "traguardi" ? "#4A3A6B" : "#B3A5D6", border: "none", borderRadius: 10, padding: "8px 0", cursor: "pointer", fontWeight: tab === "traguardi" ? 700 : 500, fontFamily: "'Quicksand', sans-serif", fontSize: 11 } }, "Traguardi"),
          React.createElement("button", { onClick: () => setTab("vizi"), style: { background: tab === "vizi" ? "#FFE070" : "transparent", color: tab === "vizi" ? "#4A3A6B" : "#B3A5D6", border: "none", borderRadius: 10, padding: "8px 0", cursor: "pointer", fontWeight: tab === "vizi" ? 700 : 500, fontFamily: "'Quicksand', sans-serif", fontSize: 11 } }, "Vizi"),
          React.createElement("button", { onClick: () => setTab("stats"), style: { background: tab === "stats" ? "#FFE070" : "transparent", color: tab === "stats" ? "#4A3A6B" : "#B3A5D6", border: "none", borderRadius: 10, padding: "8px 0", cursor: "pointer", fontWeight: tab === "stats" ? 700 : 500, fontFamily: "'Quicksand', sans-serif", fontSize: 11 } }, "Stats")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CucciolataApp));
  </script>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
</body>
